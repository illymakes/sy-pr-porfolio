name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # or 'master' — whatever your branch is called

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./          # folder to upload (use ./dist/ if you have a build step)
          server-dir: /public_html/   # Hostinger's web root